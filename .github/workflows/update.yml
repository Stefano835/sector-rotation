name: Update Megatrend ETF Data
# Aggiorna i dati di mercato e committa data/sector_data.json
# Esecuzione automatica: ogni sabato mattina alle 08:00 italiane (06:00 UTC)
# Esecuzione manuale: dal tab Actions cliccando "Run workflow"
# Esecuzione su push: ad ogni commit su main (utile come "trigger di test")

on:
  schedule:
    - cron: '0 6 * * 6'
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy

      - name: Run update script
        run: python scripts/update_data.py

      - name: Check generated JSON
        run: |
          if [ ! -f data/sector_data.json ]; then
            echo "ERROR: data/sector_data.json non generato"
            exit 1
          fi
          ls -la data/sector_data.json
          echo "Dimensione: $(wc -c < data/sector_data.json) byte"

      - name: Commit and push changes
        run: |
          git config --global user.name 'Sector Bot'
          git config --global user.email 'bot@users.noreply.github.com'
          git add data/sector_data.json
          if git diff --staged --quiet; then
            echo "Nessuna modifica ai dati"
          else
            git commit -m "Auto-update: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "Commit eseguito"
          fi

